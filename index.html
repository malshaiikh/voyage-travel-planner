<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voyage</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo"><i class="fa-regular fa-compass"></i></div> VOYAGE
    </header>
    <div class="container">
        <div class="home-page">
            <div class="hero">
                <h1>PLAN YOUR <span>TRIP</span></h1>
                <p>Search any city. Build your perfect itinerary, day by day.</p>
            </div>
            <div class="search-container glass">
                <i class="fa-regular fa-location-dot"></i>
                <input type="text" id="search-input" placeholder="Where do you want to go?">
                <i class="fa-regular fa-calendar"></i>
                <div class="calender-picker">
                    <label for="start-date">FROM</label>
                    <input type="date" name="start-date" id="start-date">
                </div>
                <hr>
                <i class="fa-regular fa-calendar"></i>
                <div class="calender-picker">
                    <label for="end-date">TO</label>
                    <input type="date" name="end-date" id="end-date">
                </div>
                <button id="explore-btn">Explore <i class="fa-solid fa-arrow-right"></i></button>
            </div>
            <div class="saved-trips-container">
                <h3 class="section-title"> YOUR SAVED TRIPS</h3>
                <div class="trips">
                    <div class="trip glass">
                        <div class="pic-container">
                            <img id="country-pic" src="assetss/gabriel-villaverde-RmK-amKtLLU-unsplash.jpg" alt="trip country picture">
                            <i class="fa-regular fa-trash-can hidden"></i>
                            <p id="duration" class="glass"># DAYS</p>
                        </div>
                        <p id="country-capital">Country, Capital</p>
                        <p id="saved-on-date">Saved on Oct 12, 2023</p>
                    </div>
                    <div class="trip glass">
                        <div class="pic-container">
                            <img id="country-pic" src="assetss/michael-worden-TomHMvzU4jQ-unsplash.jpg" alt="trip country picture">
                            <i class="fa-regular fa-trash-can hidden"></i>
                            <p id="duration" class="glass"># DAYS</p>
                        </div>
                        <p id="country-capital">Country, Capital</p>
                        <p id="saved-on-date">Saved on Oct 12, 2023</p>
                    </div>

                </div>
            </div>
        </div>

        <div class="planing-page hidden">
            <nav>
                <div class="logo"><i class="fa-regular fa-compass"></i></div> VOYAGE
            </nav>
            <div class="banner">
                <div class="weather">weather</div>
                <div class="country">country</div>
            </div>
            <div class="explore-container">
                <div class="category-tabs">
                    <button class="attractions">Attractions</button>
                    <button class="restaurants">Restaurants</button>
                    <button class="shopping">Shopping</button>
                </div>
                <div class="tab-places">
                    <div class="place">place1</div>
                    <div class="place">place2</div>
                    <div class="place">place3</div>
                    <div class="place">place4</div>
                </div>
            </div>
            <div class="plan">
                <div class="trip-schedule">
                    <h3><i class="fa-regular fa-calendar"></i>Trip Schedule</h3>
                    <div class="day-plan">day1</div>
                    <div class="day-plan">day2</div>
                    <div class="day-plan">day3</div>
                </div>
        
                <div class="packing-list">
                    <h3><i class="fa-solid fa-list-check"></i>Packing List</h3>
                    <input type="checkbox" id="task">
                    <label for="task">Passport & Visa</label>
                    <div class="task-insertion">
                        <input type="text" id="task-input" placeholder="Add item...">
                        <button id="add-task-btn"><i class="fa-solid fa-plus"></i></button>
                    </div>
                </div>
        
                <button id="save-plan-btn"><i class="fa-regular fa-map"></i> Generate Itinerary</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
